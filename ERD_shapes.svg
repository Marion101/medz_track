<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222"/>
    </marker>
    <marker id="one" markerWidth="10" markerHeight="14" refX="2" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,1 L2,13" stroke="#222" stroke-width="2" fill="none"/>
    </marker>
    <marker id="many" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M12,7 L2,1 M12,7 L2,7 M12,7 L2,13" stroke="#222" stroke-width="2" fill="none"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #18212f; }
      .label { font: 700 17px Arial, sans-serif; fill: #18212f; }
      .small { font: 14px Arial, sans-serif; fill: #18212f; }
      .entity { fill: #d9ecff; stroke: #1f4f82; stroke-width: 2.5; rx: 0; }
      .attribute { fill: #fff4cc; stroke: #8f6b00; stroke-width: 2; }
      .relationship { fill: #ffe1e1; stroke: #9b2f2f; stroke-width: 2.5; }
      .line { stroke: #222; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .one-many { stroke: #222; stroke-width: 2.2; fill: none; marker-start: url(#one); marker-end: url(#many); }
      .many-many { stroke: #222; stroke-width: 2.2; fill: none; marker-start: url(#many); marker-end: url(#many); }
      .plain-line { stroke: #555; stroke-width: 1.8; fill: none; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="#ffffff"/>
  <text x="700" y="52" text-anchor="middle" class="title">MedzTrack Entity Relationship Diagram</text>
  <text x="700" y="80" text-anchor="middle" class="small">Rectangles = entities | Ovals = attributes | Triangles = relationships | |--&lt; = one-to-many | &gt;--&lt; = many-to-many</text>

  <!-- USERS entity -->
  <rect x="100" y="380" width="210" height="90" class="entity"/>
  <text x="205" y="433" text-anchor="middle" class="label">USERS</text>

  <ellipse cx="105" cy="235" rx="68" ry="28" class="attribute"/>
  <text x="105" y="240" text-anchor="middle" class="small">id (PK)</text>
  <line x1="130" y1="260" x2="175" y2="380" class="plain-line"/>

  <ellipse cx="255" cy="235" rx="76" ry="28" class="attribute"/>
  <text x="255" y="240" text-anchor="middle" class="small">email</text>
  <line x1="245" y1="263" x2="220" y2="380" class="plain-line"/>

  <ellipse cx="85" cy="310" rx="72" ry="28" class="attribute"/>
  <text x="85" y="315" text-anchor="middle" class="small">name</text>
  <line x1="120" y1="334" x2="165" y2="380" class="plain-line"/>

  <ellipse cx="245" cy="310" rx="76" ry="28" class="attribute"/>
  <text x="245" y="315" text-anchor="middle" class="small">role</text>
  <line x1="238" y1="338" x2="230" y2="380" class="plain-line"/>

  <ellipse cx="92" cy="555" rx="86" ry="28" class="attribute"/>
  <text x="92" y="560" text-anchor="middle" class="small">password</text>
  <line x1="135" y1="531" x2="175" y2="470" class="plain-line"/>

  <ellipse cx="263" cy="555" rx="95" ry="28" class="attribute"/>
  <text x="263" y="560" text-anchor="middle" class="small">created_at</text>
  <line x1="245" y1="528" x2="225" y2="470" class="plain-line"/>

  <!-- MEDICINES entity -->
  <rect x="620" y="190" width="250" height="90" class="entity"/>
  <text x="745" y="243" text-anchor="middle" class="label">MEDICINES</text>

  <ellipse cx="565" cy="95" rx="68" ry="28" class="attribute"/>
  <text x="565" y="100" text-anchor="middle" class="small">id (PK)</text>
  <line x1="605" y1="118" x2="670" y2="190" class="plain-line"/>

  <ellipse cx="735" cy="95" rx="90" ry="28" class="attribute"/>
  <text x="735" y="100" text-anchor="middle" class="small">user_email</text>
  <line x1="738" y1="123" x2="740" y2="190" class="plain-line"/>

  <ellipse cx="925" cy="95" rx="105" ry="28" class="attribute"/>
  <text x="925" y="100" text-anchor="middle" class="small">added_by_email</text>
  <line x1="885" y1="119" x2="815" y2="190" class="plain-line"/>

  <ellipse cx="575" cy="360" rx="105" ry="28" class="attribute"/>
  <text x="575" y="365" text-anchor="middle" class="small">medicine_name</text>
  <line x1="620" y1="337" x2="670" y2="280" class="plain-line"/>

  <ellipse cx="745" cy="360" rx="82" ry="28" class="attribute"/>
  <text x="745" y="365" text-anchor="middle" class="small">quantity</text>
  <line x1="745" y1="332" x2="745" y2="280" class="plain-line"/>

  <ellipse cx="925" cy="360" rx="90" ry="28" class="attribute"/>
  <text x="925" y="365" text-anchor="middle" class="small">expiry_date</text>
  <line x1="882" y1="336" x2="820" y2="280" class="plain-line"/>

  <ellipse cx="745" cy="430" rx="82" ry="28" class="attribute"/>
  <text x="745" y="435" text-anchor="middle" class="small">category</text>
  <line x1="745" y1="402" x2="745" y2="280" class="plain-line"/>

  <!-- ACTIVITY_LOG entity -->
  <rect x="1020" y="385" width="250" height="90" class="entity"/>
  <text x="1145" y="438" text-anchor="middle" class="label">ACTIVITY_LOG</text>

  <ellipse cx="995" cy="255" rx="68" ry="28" class="attribute"/>
  <text x="995" y="260" text-anchor="middle" class="small">id (PK)</text>
  <line x1="1025" y1="280" x2="1080" y2="385" class="plain-line"/>

  <ellipse cx="1150" cy="255" rx="90" ry="28" class="attribute"/>
  <text x="1150" y="260" text-anchor="middle" class="small">user_email</text>
  <line x1="1150" y1="283" x2="1148" y2="385" class="plain-line"/>

  <ellipse cx="1305" cy="255" rx="76" ry="28" class="attribute"/>
  <text x="1305" y="260" text-anchor="middle" class="small">action</text>
  <line x1="1270" y1="280" x2="1210" y2="385" class="plain-line"/>

  <ellipse cx="1030" cy="570" rx="78" ry="28" class="attribute"/>
  <text x="1030" y="575" text-anchor="middle" class="small">details</text>
  <line x1="1065" y1="545" x2="1105" y2="475" class="plain-line"/>

  <ellipse cx="1198" cy="570" rx="95" ry="28" class="attribute"/>
  <text x="1198" y="575" text-anchor="middle" class="small">created_at</text>
  <line x1="1185" y1="542" x2="1160" y2="475" class="plain-line"/>

  <!-- DOSE_LOGS entity -->
  <rect x="620" y="690" width="250" height="90" class="entity"/>
  <text x="745" y="743" text-anchor="middle" class="label">DOSE_LOGS</text>

  <ellipse cx="570" cy="835" rx="68" ry="28" class="attribute"/>
  <text x="570" y="840" text-anchor="middle" class="small">id (PK)</text>
  <line x1="610" y1="812" x2="665" y2="780" class="plain-line"/>

  <ellipse cx="735" cy="845" rx="90" ry="28" class="attribute"/>
  <text x="735" y="850" text-anchor="middle" class="small">user_email</text>
  <line x1="737" y1="817" x2="740" y2="780" class="plain-line"/>

  <ellipse cx="925" cy="835" rx="86" ry="28" class="attribute"/>
  <text x="925" y="840" text-anchor="middle" class="small">doses_used</text>
  <line x1="880" y1="812" x2="820" y2="780" class="plain-line"/>

  <!-- Relationship triangles -->
  <polygon points="455,185 520,295 390,295" class="relationship"/>
  <text x="455" y="255" text-anchor="middle" class="label">OWNS</text>

  <polygon points="455,315 520,425 390,425" class="relationship"/>
  <text x="455" y="385" text-anchor="middle" class="label">ADDS</text>

  <polygon points="780,435 845,545 715,545" class="relationship"/>
  <text x="780" y="505" text-anchor="middle" class="label">PERFORMS</text>

  <polygon points="455,620 520,730 390,730" class="relationship"/>
  <text x="455" y="690" text-anchor="middle" class="label">RECORDS</text>

  <!-- Relationship arrows -->
  <path d="M310 405 C360 360, 385 310, 430 292" class="one-many"/>
  <path d="M490 245 C540 225, 580 220, 620 225" class="one-many"/>

  <path d="M310 435 C360 425, 385 415, 430 405" class="one-many"/>
  <path d="M520 375 C560 330, 590 290, 620 260" class="one-many"/>

  <path d="M310 455 C470 540, 640 545, 745 545" class="one-many"/>
  <path d="M845 500 C925 470, 965 445, 1020 435" class="one-many"/>

  <path d="M310 455 C360 530, 385 610, 430 665" class="one-many"/>
  <path d="M520 690 C565 710, 590 720, 620 728" class="one-many"/>

  <!-- Cardinality notes -->
  <text x="335" y="380" class="small">one</text>
  <text x="578" y="218" class="small">many</text>
  <text x="335" y="430" class="small">one</text>
  <text x="578" y="285" class="small">many</text>
  <text x="338" y="492" class="small">one</text>
  <text x="982" y="420" class="small">many</text>
  <text x="335" y="545" class="small">one</text>
  <text x="578" y="715" class="small">many</text>

  <text x="1080" y="900" class="small">Legend: |--&lt; one-to-many</text>
  <line x1="1080" y1="922" x2="1220" y2="922" class="one-many"/>
  <text x="1080" y="950" class="small">Legend: &gt;--&lt; many-to-many</text>
  <line x1="1080" y1="970" x2="1220" y2="970" class="many-many"/>
</svg>
